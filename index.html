<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Interactive Quiz App</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Quiz App">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="icon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body oncontextmenu="return false;">
  <div id="officialLogo">
    <img src="imgs/8world-vertical.png" alt="8world" class="official-logo-img">
  </div>

  <main class="app-shell">
    <section id="loading-screen" class="screen loading-panel fade-in-up">
      <p>题库载入中...</p>
    </section>

    <section id="start-screen" class="screen hidden">
      <h1 class="start-title fade-in-up">准备好了吗？</h1>
      <button id="start" class="btn btn-primary fade-in-up" type="button">开始回答</button>
    </section>

    <section id="quiz-screen" class="screen quiz-panel hidden">
      <div id="question"></div>
      <div id="answers"></div>
      <div id="result"></div>
      <div class="actions">
        <button id="next" class="btn btn-primary hidden-btn" type="button">下一题</button>
      </div>
    </section>

    <section id="summary-screen" class="screen summary-panel hidden">
      <h2 class="summary-title fade-in-up">小结</h2>
      <p id="summary-subtitle" class="summary-subtitle fade-in-up"></p>
      <div class="score-grid fade-in-up">
        <div class="score-card">
          <span class="score-label">答对</span>
          <span id="correct-count" class="score-value">0</span>
        </div>
        <div class="score-card">
          <span class="score-label">答错</span>
          <span id="wrong-count" class="score-value">0</span>
        </div>
      </div>
      <div class="actions fade-in-up">
        <button id="continue" class="btn btn-primary" type="button">继续回答</button>
        <button id="restart" class="btn btn-secondary" type="button">重新开始</button>
      </div>
    </section>
  </main>

  <div id="copyright">&copy; 2026 &copy;. All rights reserved.</div>
  <button id="reset" class="btn-small" type="button">Reset</button>

  <audio id="correctSound" src="audio/correct.mp3"></audio>
  <audio id="incorrectSound" src="audio/wrong.mp3"></audio>
  <audio id="startSound" src="audio/game-start.mp3"></audio>
  <audio id="resetSound" src="audio/reset.mp3"></audio>

  <script>
    const QUESTION_DATA_URL = 'json/questionnaire_data.json';
    const PAUSE_EVERY = 3;

    let questions = [];
    let currentQuestions = [];
    let currentQuestion;
    let answeredCount = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let isSummaryPending = false;

    const loadingScreen = document.getElementById('loading-screen');
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const summaryScreen = document.getElementById('summary-screen');
    const questionEl = document.getElementById('question');
    const answersEl = document.getElementById('answers');
    const resultEl = document.getElementById('result');
    const nextBtn = document.getElementById('next');
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');
    const restartBtn = document.getElementById('restart');
    const continueBtn = document.getElementById('continue');
    const correctCountEl = document.getElementById('correct-count');
    const wrongCountEl = document.getElementById('wrong-count');
    const summarySubtitleEl = document.getElementById('summary-subtitle');

    startBtn.addEventListener('click', startQuiz);
    resetBtn.addEventListener('click', resetQuiz);
    restartBtn.addEventListener('click', resetQuiz);
    continueBtn.addEventListener('click', continueQuiz);
    nextBtn.addEventListener('click', handleNextAction);

    loadQuestions();

    async function loadQuestions() {
      try {
        const response = await fetch(QUESTION_DATA_URL, { cache: 'no-store' });

        if (!response.ok) {
          throw new Error(`Question data request failed: ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data) || data.length === 0) {
          throw new Error('Question data is empty or invalid.');
        }

        questions = data;
        currentQuestions = [...questions];
        showScreen(startScreen);
      } catch (error) {
        console.error(error);
        loadingScreen.innerHTML = `
          <p>题库载入失败。</p>
          <p style="font-size:1.2rem;color:#666b93;">请确认 <code>${QUESTION_DATA_URL}</code> 存在，并透过本地 server 或 GitHub Pages 开启。</p>
        `;
      }
    }

    function showScreen(screen) {
      [loadingScreen, startScreen, quizScreen, summaryScreen].forEach(item => {
        item.classList.toggle('hidden', item !== screen);
      });
    }

    function playSound(soundId) {
      const sound = document.getElementById(soundId);

      if (!sound) {
        return;
      }

      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    function playCorrectSound() {
      playSound('correctSound');
    }

    function playIncorrectSound() {
      playSound('incorrectSound');
    }

    function playStartSound() {
      playSound('startSound');
    }

    function playResetSound() {
      playSound('resetSound');
    }

    function startQuiz() {
      answeredCount = 0;
      correctCount = 0;
      wrongCount = 0;
      currentQuestions = [...questions];
      showScreen(quizScreen);
      playStartSound();
      nextQuestion();
    }

    function resetQuiz() {
      answeredCount = 0;
      correctCount = 0;
      wrongCount = 0;
      currentQuestions = [...questions];
      currentQuestion = null;
      questionEl.innerHTML = '';
      answersEl.innerHTML = '';
      resultEl.innerHTML = '';
      nextBtn.className = 'btn btn-primary hidden-btn';
      nextBtn.textContent = '下一题';
      isSummaryPending = false;
      showScreen(startScreen);
      replayStartAnimation();
      playResetSound();
    }

    function continueQuiz() {
      isSummaryPending = false;
      showScreen(quizScreen);
      nextQuestion();
    }

    function handleNextAction() {
      if (isSummaryPending) {
        isSummaryPending = false;
        nextBtn.textContent = '下一题';
        showSummary();
        return;
      }

      nextQuestion();
    }

    function replayStartAnimation() {
      const animatedItems = startScreen.querySelectorAll('.fade-in-up');

      animatedItems.forEach(item => {
        item.classList.remove('fade-in-up');
        void item.offsetWidth;
        item.classList.add('fade-in-up');
      });
    }

    function nextQuestion() {
      resultEl.textContent = '';
      nextBtn.className = 'btn btn-primary hidden-btn';
      nextBtn.textContent = '下一题';
      isSummaryPending = false;

      if (currentQuestions.length === 0) {
        currentQuestions = [...questions];
      }

      const index = Math.floor(Math.random() * currentQuestions.length);
      currentQuestion = currentQuestions[index];
      currentQuestions.splice(index, 1);

      questionEl.classList.remove('fade-in-up');
      answersEl.classList.remove('fade-in-up');
      resultEl.classList.remove('fade-in-up');
      nextBtn.classList.remove('fade-in-up');

      questionEl.innerHTML = currentQuestion.q;
      answersEl.innerHTML = '';

      const answers = [currentQuestion.a, currentQuestion.b].sort(() => Math.random() - 0.5);

      answers.forEach(answer => {
        const button = document.createElement('button');
        button.className = 'btn btn-secondary';
        button.type = 'button';
        button.textContent = answer;
        button.addEventListener('click', () => checkAnswer(answer, button));
        answersEl.appendChild(button);
      });

      void questionEl.offsetWidth;
      void answersEl.offsetWidth;
      questionEl.classList.add('fade-in-up');
      answersEl.classList.add('fade-in-up');
    }

    function checkAnswer(answer, clickedButton) {
      const buttons = answersEl.getElementsByTagName('button');

      for (let button of buttons) {
        button.disabled = true;
        button.classList.add('disabled');
      }

      answeredCount++;

      if (answer === currentQuestion.a) {
        correctCount++;
        resultEl.innerHTML = '<div class="result-line"><span class="result-icon correct">✓</span> 恭喜答对了！！</div>';
        clickedButton.className = 'btn btn-success disabled';
        playCorrectSound();
      } else {
        wrongCount++;
        resultEl.innerHTML = '<div class="result-line"><span class="result-icon wrong">×</span> 答错咯！</div>';
        clickedButton.className = 'btn btn-danger disabled';

        for (let button of buttons) {
          if (button.textContent === currentQuestion.a) {
            button.className = 'btn btn-success disabled';
          }
        }

        playIncorrectSound();
      }

      resultEl.classList.remove('fade-in-up');
      void resultEl.offsetWidth;
      resultEl.classList.add('fade-in-up');

      setTimeout(() => {
        if (answeredCount % PAUSE_EVERY === 0) {
          isSummaryPending = true;
          nextBtn.textContent = '查看小结';
        } else {
          nextBtn.textContent = '下一题';
        }

        nextBtn.className = 'btn btn-primary';
        nextBtn.classList.remove('fade-in-up');
        void nextBtn.offsetWidth;
        nextBtn.classList.add('fade-in-up');
      }, 500);
    }

    function showSummary() {
      correctCountEl.textContent = correctCount;
      wrongCountEl.textContent = wrongCount;
      summarySubtitleEl.textContent = `已回答 ${answeredCount} 题，先暂停一下。`;
      showScreen(summaryScreen);
    }

    // iPad setting
    document.addEventListener('touchmove', function(event) {
      if (event.scale !== 1) {
        event.preventDefault();
      }
    }, { passive: false });

    console.log(`
     ,-~~-.___.
    / |  '     \\ 我想變成妳的冬天 無論妳是否在等待 我還是會來到妳的面前....
   (  )         0
    \\_/-, ,----'
       ====           //
      /  \\-'~;    /~~~(O)
     /  __/~|   /       |
   =(  _____| (_________| JK
    `);
  </script>
</body>
</html>
